  <meta name="color-scheme" content="dark" />

  <!-- SEO -->
  <title>Boyang Jiao — Cyber Neurospace | Product Designer & System Thinker</title>
  <meta name="description" content="Interactive portfolio of Boyang Jiao — a Product Designer & System Thinker. Explore projects across UX design, creative coding, and interaction design through an immersive cyberpunk OS interface." />
  <meta name="author" content="Boyang Jiao" />
  <meta name="keywords" content="Boyang Jiao, Product Designer, System Thinker, UX Design, Interaction Design, Creative Coding, Portfolio" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Boyang Jiao — Cyber Neurospace" />
  <meta property="og:description" content="Interactive portfolio of Boyang Jiao — explore projects through an immersive cyberpunk OS interface." />

  <meta property="og:site_name" content="Cyber Neurospace" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Boyang Jiao — Cyber Neurospace" />
  <meta name="twitter:description" content="Interactive portfolio of Boyang Jiao — explore projects through an immersive cyberpunk OS interface." />
  <style>
    /* Prevent FOUC (Flash of Unstyled Content) and white screen on refresh */
    html,
    body {
      background-color: #020406;
      /* Deep space black used in tokens */
      margin: 0;
      padding: 0;
    }

    #root {
      background-color: #020406;
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Static loading skeleton to prevent blank screen before React hydration -->
    <div
      style="background-color: #020406; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: #00F0FF; text-transform: uppercase;">
      <div style="letter-spacing: 0.5em; font-size: 10px; margin-bottom: 20px; opacity: 0.6;">[ Initializing Neural Link
        ]
      </div>
      <div
        style="width: 160px; height: 1px; background: rgba(0, 240, 255, 0.1); position: relative; overflow: hidden; border-radius: 0;">
        <div id="loading-bar-inner"
          style="position: absolute; width: 60px; height: 100%; background: #00F0FF; animation: skeleton-scan 1.5s infinite ease-in-out;">
        </div>
      </div>
    </div>
  </div>
  <style>
    @keyframes skeleton-scan {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(300%);
      }
    }
  </style>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
