name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push supersedes an in-flight run on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Hard gates — these block the merge (both green as of the refactor branch).
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

      # Advisory until the ~102-error legacy ESLint baseline is burned down
      # (tracked in HARNESS.md / constitution "Deliberately deferred"). New code
      # is enforced clean by the local pre-commit (lint-staged) hook.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true
